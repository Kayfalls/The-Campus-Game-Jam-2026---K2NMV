<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Mirror Maze of Sound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{ --abyss:#04070c; --panel:#0a1017; --line:#182430; --pulse:#57e8d4; --mirror:#eef4f6; --ink:#cfe0ea; --ink-dim:#4d6577; }
    *{box-sizing:border-box;} html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(ellipse at 50% 30%, #060b12 0%, #03050a 70%);color:var(--ink);font-family:'JetBrains Mono', monospace;user-select:none;}
    .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;text-align:center;}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:28px 32px;max-width:420px;width:100%;}
    h1,h2{font-family:'Cormorant Garamond', serif; font-weight:600; letter-spacing:.03em; margin:0 0 6px;}
    .btn{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.05em;background:transparent;color:var(--ink);border:1px solid var(--line);padding:12px 20px;border-radius:6px;cursor:pointer;width:100%;margin-top:10px;transition:background .15s,color .15s;}
    .btn:hover{background:var(--pulse);color:#03130d;border-color:var(--pulse);} .btn.accent{border-color:var(--pulse);color:var(--pulse);} .small{font-size:12px;color:var(--ink-dim);} .hidden{display:none !important;}
  </style>
</head>
<body>
  <div id="screen-menu" class="screen">
    <h1>Mirror Maze of Sound</h1>
    <div class="card">
      <p class="small">Co-op survival against the dark. Play alone, or host a local match for up to 12 divers on the same Wi-Fi.</p>
      <button class="btn accent" onclick="window.location.href='/client.html'">Play Game</button>
    </div>
  </div>
</body>
</html>
